# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# leave blank for local time
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created
# with logging configuration
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, severity should be configured via the
# version_locations option.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# the propagation of "version_locations" is
# controlled; use "true" to propagate configurations.
# recursive_version_locations = false

# the output encoding used when writing to the stdout
# output_encoding = utf-8

# sqlalchemy.url = postgresql://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a revision file
# see https://alembic.sqlalchemy.org/en/latest/api/config.html#alembic.config.Config.set_main_option
# for details

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
