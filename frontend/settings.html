<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Profile Settings - Fintrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Link CSS files -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body style="background:#0b0f1a; color:#f1f5f9; min-height:100vh; overflow-x:hidden;">

<!-- GLOBAL LOADER -->
<div id="loading-overlay" class="loading-overlay">
  <div class="loader-wrapper">
    <span class="loader-letter">l</span>
    <span class="loader-letter">o</span>
    <span class="loader-letter">a</span>
    <span class="loader-letter">d</span>
    <span class="loader-letter">i</span>
    <span class="loader-letter">n</span>
    <span class="loader-letter">g</span>
    <div class="loader"></div>
  </div>
</div>

<!-- ===================== SETTINGS MAIN ===================== -->
<div style="max-width:1300px; margin:0 auto; padding:28px 24px 80px;">

    <!-- Page Header -->
    <div style="margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.07);">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <p style="font-size:11px; font-weight:600; color:#818cf8; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">Financial Profile</p>
        <h2 style="font-size:20px; font-weight:700; color:#f1f5f9; margin-bottom:4px;">Settings</h2>
        <p style="font-size:13px; color:#64748b;">Configure your income, debts, goals and expenses</p>
    </div>

    <!-- Sidebar + Content Layout -->
    <div style="display:flex; gap:24px; align-items:flex-start;">

        <!-- Sidebar Nav -->
        <aside class="settings-sidebar">
            <nav>
                <button onclick="settingsManager.switchTab('income')"   id="settings-tab-income"   class="settings-tab active"><span class="tab-icon">💰</span><span>Income & Tax</span></button>
                <button onclick="settingsManager.switchTab('debts')"    id="settings-tab-debts"    class="settings-tab"><span class="tab-icon">💳</span><span>Debt Portfolio</span></button>
                <button onclick="settingsManager.switchTab('bills')"    id="settings-tab-bills"    class="settings-tab"><span class="tab-icon">💸</span><span>Bills & Cards</span></button>
                <button onclick="settingsManager.switchTab('goals')"    id="settings-tab-goals"    class="settings-tab"><span class="tab-icon">🎯</span><span>Savings Goals</span></button>
                <button onclick="settingsManager.switchTab('expenses')" id="settings-tab-expenses" class="settings-tab"><span class="tab-icon">📊</span><span>Expenses</span></button>
                <button onclick="settingsManager.switchTab('overview')" id="settings-tab-overview" class="settings-tab"><span class="tab-icon">📈</span><span>Overview</span></button>
            </nav>
        </aside>

        <!-- Content Panel -->
        <div class="settings-content-panel">
            <div id="settings-content-income"   class="settings-content"></div>
            <div id="settings-content-debts"    class="settings-content hidden"></div>
            <div id="settings-content-bills"    class="settings-content hidden"></div>
            <div id="settings-content-goals"    class="settings-content hidden"></div>
            <div id="settings-content-expenses" class="settings-content hidden"></div>
            <div id="settings-content-overview" class="settings-content hidden"></div>
        </div>
    </div>

</div>

<div id="modals-container"></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script type="module" src="js/settings.js"></script>

<script>
// Proxy — routes onclick calls to settingsManager once module is ready
const smProxy = new Proxy({}, {
    get(_, prop) {
        return (...args) => {
            if (window.settingsManager !== smProxy) {
                window.settingsManager[prop](...args);
            } else {
                document.addEventListener('settingsReady', () => {
                    window.settingsManager[prop](...args);
                }, { once: true });
            }
        };
    }
});
window.settingsManager = smProxy;
</script>
</body>
</html>
