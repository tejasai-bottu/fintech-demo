version: "3.9"

services:
  adminer:
    image: adminer
    container_name: fintech-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - fintech-network

  db:
    image: postgres:15-alpine
    container_name: fintech-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fintech-backend
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fintech-network
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: fintech-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - fintech-network
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

  bill-scanner:
    build: ./bill-scanner
    container_name: fintech-bill-scanner
    ports:
      - "${BILL_SCANNER_PORT}:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VECTOR_DATA_PATH: /app/vector_data
      FINTECH_BASE_URL: http://backend:8000
      FINTECH_EMAIL: ${POSTGRES_USER}@example.com
      FINTECH_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fintech-network
    volumes:
      - ./bill-scanner/app:/app

networks:
  fintech-network:
    driver: bridge

volumes:
  postgres_data: